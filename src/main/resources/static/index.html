<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Türkçesi Varken</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link
            href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
            rel="stylesheet"
    >

    <style>

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #0f172a;
            color: white;
            min-height: 100vh;
        }

        .background {
            position: fixed;
            inset: 0;
            z-index: -1;

            background:
                    radial-gradient(circle at top left, rgba(59,130,246,0.25), transparent 30%),
                    radial-gradient(circle at bottom right, rgba(168,85,247,0.2), transparent 30%),
                    #0f172a;
        }

        .container {
            width: 100%;
            max-width: 1100px;
            margin: 0 auto;
            padding: 32px;
        }

        .navbar {
            margin-bottom: 100px;
        }

        .logo {
            font-size: 28px;
            font-weight: 800;
            letter-spacing: -1px;
        }

        .logo span {
            color: #60a5fa;
        }

        .hero {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            min-height: 70vh;
        }

        .badge {
            padding: 10px 18px;
            border-radius: 999px;
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.08);
            color: #cbd5e1;
            margin-bottom: 28px;
        }

        h1 {
            font-size: clamp(52px, 7vw, 92px);
            line-height: 0.95;
            letter-spacing: -4px;
            margin-bottom: 28px;
        }

        .highlight {
            color: #60a5fa;
        }

        .description {
            max-width: 720px;
            color: #94a3b8;
            font-size: 20px;
            line-height: 1.7;
            margin-bottom: 48px;
        }

        .search-wrapper {
            width: 100%;
            max-width: 760px;
            position: relative;
        }

        .search-box {
            width: 100%;
            border: none;
            outline: none;

            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.08);

            border-radius: 28px;

            padding: 26px 180px 26px 28px;

            color: white;
            font-size: 20px;

            backdrop-filter: blur(12px);

            transition: 0.2s ease;
        }

        .search-box:focus {
            border-color: #60a5fa;
            box-shadow: 0 0 0 6px rgba(96,165,250,0.12);
        }

        .search-box::placeholder {
            color: #64748b;
        }

        .search-button {
            position: absolute;
            top: 10px;
            right: 10px;

            border: none;
            cursor: pointer;

            background: #3b82f6;
            color: white;

            padding: 16px 24px;

            border-radius: 18px;

            font-size: 16px;
            font-weight: 700;

            transition: 0.2s ease;
        }

        .search-button:hover {
            background: #2563eb;
        }

        .word-page {
            display: none;
            padding-top: 40px;
        }

        .back-button {
            display: inline-flex;
            margin-bottom: 24px;
            text-decoration: none;
            color: #94a3b8;
            font-weight: 600;
        }

        .word-card {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 32px;
            padding: 42px;
            backdrop-filter: blur(14px);
        }

        .word-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 16px;
            flex-wrap: wrap;
            margin-bottom: 28px;
        }

        .word-title {
            font-size: 58px;
            font-weight: 800;
            letter-spacing: -2px;
        }

        .tdk-badge {
            padding: 10px 18px;
            border-radius: 999px;

            background: rgba(34,197,94,0.12);
            border: 1px solid rgba(34,197,94,0.3);

            color: #4ade80;
            font-weight: 700;
        }

        .word-definition {
            font-size: 22px;
            line-height: 1.8;
            color: #e2e8f0;
            margin-bottom: 36px;
        }

        .meta-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .meta-card {
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 22px;
            padding: 22px;
        }

        .meta-label {
            color: #64748b;
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
        }

        .meta-value {
            font-size: 18px;
            font-weight: 600;
        }

        .section {
            margin-top: 32px;
        }

        .section-title {
            font-size: 22px;
            margin-bottom: 18px;
        }

        .pill-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .pill {
            padding: 12px 18px;
            border-radius: 999px;

            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.08);

            color: #e2e8f0;
            text-decoration: none;

            transition: 0.2s ease;
        }

        .pill:hover {
            background: rgba(96,165,250,0.15);
            border-color: rgba(96,165,250,0.4);
        }

        .empty-text {
            color: #64748b;
        }

        @media(max-width: 768px) {

            .container {
                padding: 24px;
            }

            h1 {
                letter-spacing: -2px;
            }

            .search-box {
                padding-right: 24px;
                font-size: 18px;
            }

            .search-button {
                position: static;
                width: 100%;
                margin-top: 14px;
            }

            .word-title {
                font-size: 42px;
            }

        }

    </style>
</head>
<body>

<div class="background"></div>

<div class="container">

    <div class="navbar">
        <div class="logo">
            Türkçesi <span>Varken</span>
        </div>
    </div>

    <!-- HOME -->

    <section class="hero" id="homePage">

        <div class="badge">
            Modern Türkçe sözlük platformu
        </div>

        <h1>
            Türkçe kelimeleri
            <span class="highlight">yeniden keşfet.</span>
        </h1>

        <p class="description">
            Kökenler, eş anlamlılar ve anlam dünyasını keşfet.
        </p>

        <div class="search-wrapper">

            <input
                    id="searchInput"
                    class="search-box"
                    type="text"
                    placeholder="Kelime ara..."
            />

            <button class="search-button" onclick="searchWord()">
                Ara
            </button>

        </div>

    </section>

    <!-- WORD PAGE -->

    <section class="word-page" id="wordPage">

        <a href="#" class="back-button" onclick="goHome()">
            ← Ana sayfaya dön
        </a>

        <div class="word-card">

            <div class="word-header">

                <div class="word-title" id="wordTitle">
                    beden
                </div>

                <div class="tdk-badge" id="tdkBadge">
                    ✓ TDK Onaylı
                </div>

            </div>

            <div class="word-definition" id="wordDefinition">
                İnsan vücudu.
            </div>

            <div class="meta-grid">

                <div class="meta-card">
                    <div class="meta-label">Köken</div>
                    <div class="meta-value" id="wordOrigin">Arapça</div>
                </div>

                <div class="meta-card">
                    <div class="meta-label">Kategori</div>
                    <div class="meta-value" id="wordCategory">Doğa</div>
                </div>

                <div class="meta-card">
                    <div class="meta-label">Puan</div>

                    <div class="meta-value" id="wordRating"></div>
                </div>

            </div>

            <div class="section">

                <div class="section-title">
                    Eş anlamlılar
                </div>

                <div class="pill-list" id="synonymList"></div>

            </div>

            <div class="section">

                <div class="section-title">
                    Benzer sözcükler
                </div>

                <div class="pill-list" id="similarList"></div>

            </div>

            <div class="section">

                <div class="section-title">
                    Notlar
                </div>

                <div
                        class="word-definition"
                        id="wordNotes"
                        style="font-size:18px; color:#cbd5e1; margin-bottom:0;"
                >
                    -
                </div>

            </div>

        </div>

    </section>

</div>

<script>

    async function searchWord() {

        const value = document
            .getElementById("searchInput")
            .value
            .trim()
            .toLowerCase();

        if (!value) {
            return;
        }

        await openWord(value);

    }

    async function openWord(slug) {

        try {

            const response = await fetch(`/words/${slug}`);

            if (!response.ok) {
                alert("Kelime bulunamadı.");
                return;
            }

            const word = await response.json();

            document.getElementById("homePage").style.display = "none";
            document.getElementById("wordPage").style.display = "block";

            document.getElementById("wordTitle").innerText =
                word.name;

            document.getElementById("wordDefinition").innerText =
                word.definition || "-";

            document.getElementById("wordOrigin").innerText =
                word.origin || "-";

            document.getElementById("wordCategory").innerText =
                word.category?.name || "Diğer";

            const rating = word.rating || 0;

            let stars = "";

            for (let i = 0; i < rating; i++) {
                stars += "⭐";
            }

            document.getElementById("wordRating").innerText =
                `${stars} (${rating}/5)`;

            document.getElementById("wordNotes").innerText =
                word.notes || "-";

            const tdkBadge =
                document.getElementById("tdkBadge");

            tdkBadge.style.display =
                word.tdk ? "inline-flex" : "none";

            // SYNONYMS

            const synonymList =
                document.getElementById("synonymList");

            synonymList.innerHTML = "";

            if (
                word.synonyms &&
                word.synonyms.length > 0
            ) {

                word.synonyms
                    .sort((a, b) => b.rating - a.rating)
                    .forEach(synonym => {

                        let synonymStars = "";

                        for (let i = 0; i < synonym.rating; i++) {
                            synonymStars += "⭐";
                        }

                        synonymList.innerHTML += `
                                <a
                                    href="#"
                                    class="pill"
                                    onclick="openWord('${synonym.slug}')"
                                >
                                    ${synonym.name} ${synonymStars}
                                </a>
                            `;

                    });

            } else {

                synonymList.innerHTML =
                    `<div class="empty-text">
                        Henüz eş anlamlı kelime eklenmedi.
                    </div>`;

            }

            // SIMILAR WORDS

            const similarList =
                document.getElementById("similarList");

            similarList.innerHTML = "";

            if (
                word.similarWords &&
                word.similarWords.length > 0
            ) {

                word.similarWords.forEach(similar => {

                    similarList.innerHTML += `
                        <a
                            href="#"
                            class="pill"
                            onclick="openWord('${similar.slug}')"
                        >
                            ${similar.name}
                        </a>
                    `;

                });

            } else {

                similarList.innerHTML =
                    `<div class="empty-text">
                        Henüz benzer sözcük eklenmedi.
                    </div>`;

            }

        } catch (e) {

            console.error(e);

            alert("Bir hata oluştu.");

        }

    }

    function goHome() {

        document.getElementById("homePage").style.display = "flex";

        document.getElementById("wordPage").style.display = "none";

    }

</script>

</body>
</html>
