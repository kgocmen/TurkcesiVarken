<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Türkçesi Varken</title>

    <link rel="stylesheet" href="/css/style.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link
            href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
            rel="stylesheet"
    >

</head>
<body>

<div class="background"></div>

<div class="container">

    <div class="navbar">

        <div class="logo">
            Türkçesi <span>Varken</span>
        </div>

    </div>

    <section class="hero">

        <div class="badge">
            Modern Türkçe sözlük platformu
        </div>

        <h1>
            Türkçe kelimeleri
            <span class="highlight">
                yeniden keşfet.
            </span>
        </h1>

        <p class="description">
            Kökenler, eş anlamlılar ve anlam dünyasını keşfet.
        </p>

        <a
                href="/admin/create.html"

                class="search-button"

                style="
                    position:static;
                    text-decoration:none;
                    display:inline-flex;
                    margin-bottom:24px;
                "
        >
            + Kelime Ekle
        </a>

        <div class="search-wrapper">

            <input
                    id="searchInput"

                    class="search-box"

                    type="text"

                    placeholder="Kelime ara..."
            />

            <button
                    class="search-button"

                    onclick="searchWord()"
            >
                Ara
            </button>

        </div>

    </section>

</div>

<script src="/js/api.js"></script>
<script src="/js/app.js"></script>

</body>
</html>
